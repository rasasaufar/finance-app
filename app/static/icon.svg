<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Rupiah symbol styled as icon -->
  <!-- Rp letters -->
  <text x="256" y="310" font-family="Georgia, serif" font-weight="700" font-size="240" text-anchor="middle" fill="url(#accent)">Rp</text>
  <!-- Bottom accent line -->
  <rect x="120" y="370" width="272" height="8" rx="4" fill="url(#accent)" opacity="0.5"/>
</svg>
