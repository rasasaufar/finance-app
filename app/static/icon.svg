<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0b1220" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="116" ry="116" fill="url(#bg)"/>

  <!-- Subtle background chart bars -->
  <g opacity="0.55">
    <rect x="78"  y="332" width="42" height="80"  rx="10" fill="url(#chart)"/>
    <rect x="138" y="296" width="42" height="116" rx="10" fill="url(#chart)"/>
    <rect x="198" y="252" width="42" height="160" rx="10" fill="url(#chart)"/>
    <rect x="332" y="220" width="42" height="192" rx="10" fill="url(#chart)"/>
    <rect x="392" y="180" width="42" height="232" rx="10" fill="url(#chart)"/>
  </g>

  <!-- Soft top sheen -->
  <rect width="512" height="512" rx="116" ry="116" fill="url(#sheen)"/>

  <!-- White rounded badge for the Rp mark -->
  <g filter="url(#shadow)">
    <rect x="118" y="118" width="276" height="276" rx="76" ry="76" fill="#ffffff"/>
  </g>

  <!-- Rp wordmark -->
  <text x="256" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="180"
        letter-spacing="-6"
        text-anchor="middle"
        fill="#4f46e5">Rp</text>

  <!-- Underline accent -->
  <rect x="176" y="346" width="160" height="10" rx="5" fill="#06b6d4"/>

  <!-- Tiny upward arrow tick -->
  <path d="M340 156 l28 0 l0 28 m0 -28 l-46 46"
        stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
</svg>
